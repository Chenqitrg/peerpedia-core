<circle cx="45" cy="445" r="3" fill="#6b7280"/>
<text x="53" y="449" fill="#6b7280" font-size="8">① CLI → bundle_client (触发同步)</text>
<circle cx="465" cy="445" r="3" fill="#8b5cf6"/>
<text x="473" y="449" fill="#6b7280" font-size="8">② bundle_server → commands (DB reconcile)</text>
<text x="45" y="480" fill="#374151" font-size="9" font-weight="600">关键规则</text>
<text x="45" y="496" fill="#6b7280" font-size="8">• commands.py = 唯一数据接口（只有它能同时碰 git_backend 和 storage/db）</text>
<text x="45" y="511" fill="#6b7280" font-size="8">• Sync Domain 自包含：git_bundle 不依赖 git_backend，只依赖 GitPython</text>
<text x="45" y="526" fill="#6b7280" font-size="8">• git_backend 和 git_bundle 互不 import — 两条独立的 git 模块</text>
<text x="45" y="541" fill="#6b7280" font-size="8">• HTTP 可插拔：换协议只需替换 transport/，bundle_client/server 不变</text>
